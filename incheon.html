<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티움 ABA 사회성연구소</title>
    <link rel="stylesheet" href="style.css"> <!-- 스타일 시트 연결 -->
</head>
<link href="/CSS/common_style.css" rel="stylesheet" type="text/css" />
<style>
	.image-container {
    background-image: url('./CSS/image/page_thumnail/default.jpg');
}
</style>
<body>

    <!-- Header를 불러오기 -->
    <div id="header-placeholder"></div>

    <main>
        <div class="image-container">
			<div class="overlay"></div>
			<div class="centered-text">티움ABA 사회성연구소(인천)</div>
		</div>
		<div class="letter-background">
			<div class="letter-section">
                    <hr>
    <p><img decoding="async" src="/CSS/image/place_pic/in1.jpg" alt=""  class="responsive-img"></p>
    <p>연구소 전경</p>
    <p><img decoding="async" src="/CSS/image/place_pic/in2.jpg" alt=""class="responsive-img"></p>
    <p>작은 놀이터</p>
    <p><img decoding="async" src="/CSS/image/place_pic/in3.jpg" alt=""class="responsive-img"></p>
    <p>ABA/ESDM 교실</p>
    <p><img decoding="async" src="/CSS/image/place_pic/in4.jpg" alt="" class="responsive-img"></p>
    <p>언어치료 교실</p>
    <p><img decoding="async" src="/CSS/image/place_pic/in5.jpg" alt="" class="responsive-img"></p>
    <p>꼬마 텃밭</p>
    <hr>        
			</div>
			</div>
    </main>

    <!-- Footer를 불러오기 -->
    <div id="footer-placeholder"></div>
	<button id="scrollToTopBtn" class="scroll-to-top">
		<img src="/CSS/image/icon/top_btn.png" alt="Top" />
	</button>
    <script>
        // header.html 파일을 불러와 삽입
        fetch('header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
    })
    .then(() => {
        // header.html이 로드된 후에 header.js를 로드
        const script = document.createElement('script');
        script.src = '/JS/header.js';
        document.body.appendChild(script);
    });

        // footer.html 파일을 불러와 삽입
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>
		<script src="/JS/scrollToTop.js"></script>
</body>
</html>
