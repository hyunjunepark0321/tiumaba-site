<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티움 ABA 사회성연구소</title>
    <link rel="stylesheet" href="style.css"> <!-- 스타일 시트 연결 -->
</head>
<link href="/CSS/common_style.css" rel="stylesheet" type="text/css" />
<style>
	.image-container {
    background-image: url('./CSS/image/page_thumnail/default.jpg');
}
</style>
<body>

    <!-- Header를 불러오기 -->
    <div id="header-placeholder"></div>

    <main>
        <div class="image-container">
			<div class="overlay"></div>
			<div class="centered-text">상황인지 사회성보드북</div>
		</div>
		<div class="letter-background">
			<div class="letter-section">
                    <p><img decoding="async" src="/CSS/image/program_pic/board.png" alt="" class="responsive-img"></p>
    <p>티움<span>ABA</span>연구소 노원점 개소를 기념하는 사회성보드북을 제작하였습니다<span>.</span></p>
    <p>연구실 또는 치료실에서 사용을 목적으로 공유를 원하시는 경우 <span><a href="mailto:tiumaba@naver.com">tiumaba@naver.com</a></span>으로 문의주시기 바랍니다<span>.</span></p>
          
			
			</div>
			</div>
    </main>

    <!-- Footer를 불러오기 -->
    <div id="footer-placeholder"></div>
	<button id="scrollToTopBtn" class="scroll-to-top">
		<img src="/CSS/image/icon/top_btn.png" alt="Top" />
	</button>
    <script>
        // header.html 파일을 불러와 삽입
        fetch('header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
    })
    .then(() => {
        // header.html이 로드된 후에 header.js를 로드
        const script = document.createElement('script');
        script.src = '/JS/header.js';
        document.body.appendChild(script);
    });

        // footer.html 파일을 불러와 삽입
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>
		<script src="/JS/scrollToTop.js"></script>
</body>
</html>
