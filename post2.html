<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티움 ABA 사회성연구소</title>
    <link rel="stylesheet" href="style.css"> <!-- 스타일 시트 연결 -->
</head>
<link href="/CSS/common_style.css" rel="stylesheet" type="text/css" />
<link href="/CSS/board_style.css" rel="stylesheet" type="text/css">
<style>
    .letter-section {
        padding: 70px 20vw 40px;
    }
    .image-container {
        background-image: url('./CSS/image/page_thumnail/default.jpg');
    }

    @media (max-width: 768px) {
    .letter-section {
        padding: 70px 5% 1px;
    }
    }
* {
    font-family: Arial, Helvetica, sans-serif;
}
</style>
<body>

    <!-- Header를 불러오기 -->
    <div id="header-placeholder"></div>

    <main>
        <div class="image-container">
			<div class="overlay"></div>
			<div class="centered-text">공지사항 글 작성</div>
		</div>
		<div class="letter-background">
			<div class="letter-section">
    
                <div id="kboard-document">
                    <div id="kboard-default-document">
                        <div class="kboard-document-wrap" itemscope="" itemtype="https://schema.org/Article">
                            <div class="kboard-title" itemprop="name">
                                <h1>로딩 중...</h1>
                            </div>
                            
                            <div class="kboard-detail">
                                <div class="detail-attr detail-writer">
                                    <div class="detail-name">작성자</div>
                                    <div class="detail-value">로딩 중...</div>
                                </div>
                                <div class="detail-attr detail-date">
                                    <div class="detail-name">작성일</div>
                                    <div class="detail-value">로딩 중...</div>
                                </div>
                                <div class="detail-attr detail-view">
                                    <div class="detail-name">조회</div>
                                    <div class="detail-value">로딩 중...</div>
                                </div>
                            </div>
                            
                            <div class="kboard-content" itemprop="description">
                                <div class="content-view">로딩 중...</div>
                            </div>
                            
                                    </div>
                        
                            
                        
                        <div class="kboard-control">
                            <div class="left">
                                <a href="notice.html" class="kboard-default-button-small">목록보기</a>
                       		</div>
                               <div class="right">
                                <button class="kboard-default-button-small edit-btn">글수정</button>
                                <button class="kboard-default-button-small delete-btn">글삭제</button>
                            </div>
                                    </div>
                        
                        
                            </div>
                </div>
			
			</div>
			</div>
    </main>

    <!-- Footer를 불러오기 -->
    <div id="footer-placeholder"></div>
	<button id="scrollToTopBtn" class="scroll-to-top">
		<img src="/CSS/image/icon/top_btn.png" alt="Top" />
	</button>
    <script>
        // header.html 파일을 불러와 삽입
        fetch('header.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
    })
    .then(() => {
        // header.html이 로드된 후에 header.js를 로드
        const script = document.createElement('script');
        script.src = '/JS/header.js';
        document.body.appendChild(script);
    });

        // footer.html 파일을 불러와 삽입
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

            async function validatePassword(password) {
        const response = await fetch('https://tiumesdm.com/api/posts/validate-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password })
        });

        if (!response.ok) {
            throw new Error('비밀번호 검증 실패');
        }

        const result = await response.json();
        return result.valid;
    }

             // URL에서 id 추출
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

          // API 호출 및 데이터 삽입
    fetch(`https://tiumesdm.com/api/posts/${postId}`)
        .then(response => {
            if (!response.ok) {
                throw new Error('게시글 데이터를 가져올 수 없습니다.');
            }
            return response.json();
        })
        .then(post => {
            // 데이터 삽입
            document.querySelector('.kboard-title h1').textContent = post.title;
            document.querySelector('.detail-writer .detail-value').textContent = post.author;
            document.querySelector('.detail-date .detail-value').textContent = new Date(post.created_at).toLocaleString();
            document.querySelector('.detail-view .detail-value').textContent = post.views;
            document.querySelector('.kboard-content .content-view').innerHTML = post.content.replace(/\n/g, '<br>');
        })
        .catch(err => {
            console.error('API 호출 에러:', err);
            alert('게시글을 불러오는 중 오류가 발생했습니다.');
        });

         // 글수정 버튼 클릭 이벤트
    document.querySelector('.kboard-control .right .edit-btn').addEventListener('click', async () => {
        const password = prompt('관리자 비밀번호를 입력해주세요:');
        if (!password) return;

        try {
            const isValid = await validatePassword(password);
            if (isValid) {
                // 비밀번호가 맞으면 write.html로 이동
                window.location.href = `write.html?id=${postId}`;
            } else {
                alert('비밀번호가 올바르지 않습니다.');
            }
        } catch (err) {
            console.error('비밀번호 검증 에러:', err);
            alert('비밀번호 검증 중 오류가 발생했습니다.');
        }
    });

          // 삭제 버튼 클릭 이벤트
    document.querySelector('.kboard-control .right .delete-btn').addEventListener('click', async () => {
        const password = prompt('관리자 비밀번호를 입력해주세요:');
        if (!password) return;

        try {
            const isValid = await validatePassword(password);
            if (isValid) {
                if (confirm('정말 게시글을 삭제하시겠습니까? 삭제 시 기록은 서버에 저장되지만 방문객들은 더이상 게시글을 확인할 수 없습니다.')) {
                    fetch(`https://tiumesdm.com/api/posts/${postId}`, { method: 'DELETE' })
                        .then(response => {
                            if (!response.ok) throw new Error('삭제 요청 실패');
                            return response.json();
                        })
                        .then(() => {
                            alert('삭제되었습니다.');
                            window.location.href = 'notice.html';
                        })
                        .catch(err => {
                            console.error('게시글 삭제 에러:', err);
                            alert('삭제에 실패했습니다.');
                        });
                }
            } else {
                alert('비밀번호가 올바르지 않습니다.');
            }
        } catch (err) {
            console.error('비밀번호 검증 에러:', err);
            alert('비밀번호 검증 중 오류가 발생했습니다.');
        }
    });
    </script>
		<script src="/JS/scrollToTop.js"></script>
</body>
</html>
