<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>티움 ABA 사회성연구소</title>

    <link rel="stylesheet" href="style.css" />
    <link href="/CSS/common_style.css" rel="stylesheet" />
    <link href="/CSS/board_style.css" rel="stylesheet" />

    <style>
      .letter-section {
        padding: 70px 20vw 40px;
      }
      .image-container {
        background-image: url("./CSS/image/page_thumnail/default.jpg");
      }
      @media (max-width: 768px) {
        .letter-section {
          padding: 70px 5% 1px;
        }
      }
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>

  <body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main>
      <!-- 상단 이미지 영역 -->
      <div class="image-container">
        <div class="overlay"></div>
        <div class="centered-text">공지사항</div>
      </div>

      <!-- 본문 -->
      <div class="letter-background">
        <div class="letter-section">
          <div id="kboard-document">
            <div id="kboard-default-document">
              <div
                class="kboard-document-wrap"
                itemscope
                itemtype="https://schema.org/Article"
              >
                <!-- 제목 -->
                <div class="kboard-title" itemprop="name">
                  <h1 id="postTitle">로딩 중...</h1>
                </div>

                <!-- 작성 정보 -->
                <div class="kboard-detail">
                  <div class="detail-attr detail-writer">
                    <div class="detail-name">작성자</div>
                    <div class="detail-value" id="postWriter">로딩 중...</div>
                  </div>
                  <div class="detail-attr detail-date">
                    <div class="detail-name">작성일</div>
                    <div class="detail-value" id="postDate">로딩 중...</div>
                  </div>
                </div>

                <!-- 내용 -->
                <div class="kboard-content" itemprop="description">
                  <div class="content-view" id="postContent">로딩 중...</div>
                </div>
              </div>

              <!-- 하단 버튼 -->
              <div class="kboard-control">
                <div class="left">
                  <a href="notice.html" class="kboard-default-button-small"
                    >목록보기</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Top 버튼 -->
    <button id="scrollToTopBtn" class="scroll-to-top">
      <img src="/CSS/image/icon/top_btn.png" alt="Top" />
    </button>

    <!-- ================= JS ================= -->
    <script>

      fetch("header.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header-placeholder").innerHTML = html;

          document.body.appendChild(script);

        .then((html) => {
          document.getElementById("footer-placeholder").innerHTML = html;

      const id = params.get("id");

        document.getElementById("postTitle").textContent = posts[id].title;
        document.getElementById("postWriter").textContent = posts[id].writer;
        document.getElementById("postDate").textContent = posts[id].date;
